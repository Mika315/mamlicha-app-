<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פאנל ניהול | ממליצה לך בגדול</title>
  <style>
    :root {
      --pink: #c0607f;
      --pink-light: #fff0f6;
      --pink-mid: #f7ccd8;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--pink-light);
      min-height: 100vh;
      color: #333;
      direction: rtl;
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .login-box h1 { color: var(--pink); font-size: 1.6rem; margin-bottom: 0.4rem; }
    .login-box p  { color: #888; font-size: 0.88rem; margin-bottom: 1.5rem; }
    .login-box input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #e0c0cc;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 1rem;
      outline: none;
      text-align: center;
      letter-spacing: 0.1em;
      font-family: inherit;
    }
    .login-box input:focus { border-color: var(--pink); }
    .btn-pink {
      width: 100%;
      padding: 0.75rem;
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-pink:hover { background: #a84f6e; }
    #login-error { color: #c0607f; font-size: 0.88rem; margin-top: 0.75rem; min-height: 1.2em; }

    /* ── MAIN PANEL ── */
    #admin-screen { display: none; }
    .admin-header {
      background: var(--pink);
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header h1 { font-size: 1.2rem; }
    .btn-logout {
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }

    .tabs {
      display: flex;
      gap: 0;
      background: #fff;
      border-bottom: 2px solid var(--pink-mid);
      padding: 0 1.5rem;
    }
    .tab-btn {
      padding: 0.75rem 1.5rem;
      border: none;
      background: none;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      color: #888;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      font-weight: 600;
    }
    .tab-btn.active { color: var(--pink); border-bottom-color: var(--pink); }

    .tab-content { display: none; padding: 1.5rem; }
    .tab-content.active { display: block; }

    .stats-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }
    .stat-pill {
      background: #fff;
      border: 1.5px solid var(--pink-mid);
      border-radius: 20px;
      padding: 0.35rem 1rem;
      font-size: 0.85rem;
      color: var(--pink);
      font-weight: 600;
    }

    .search-bar {
      margin-bottom: 1rem;
    }
    .search-bar input {
      width: 100%;
      max-width: 360px;
      padding: 0.55rem 0.9rem;
      border: 1.5px solid #e0c0cc;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
    }
    .search-bar input:focus { border-color: var(--pink); }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      font-size: 0.88rem;
    }
    .data-table th {
      background: var(--pink);
      color: #fff;
      padding: 0.7rem 0.8rem;
      text-align: right;
      font-weight: 600;
    }
    .data-table td {
      padding: 0.65rem 0.8rem;
      border-bottom: 1px solid #f3e0e8;
      vertical-align: top;
      max-width: 200px;
      word-break: break-word;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #fff8fb; }

    .btn-del {
      background: #fff;
      color: #c0607f;
      border: 1.5px solid #c0607f;
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .btn-del:hover { background: #c0607f; color: #fff; }

    .loading { text-align:center; padding: 2rem; color: #aaa; }
    .empty   { text-align:center; padding: 2rem; color: #bbb; font-size: 0.95rem; }

    .img-thumb {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 6px;
      cursor: zoom-in;
    }

    /* Lightbox */
    #lb {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lb img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>🔐 פאנל ניהול</h1>
    <p>ממליצה לך בגדול</p>
    <input type="password" id="pwd-input" placeholder="סיסמת מנהל" autocomplete="current-password" />
    <button class="btn-pink" id="btn-login">כניסה</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- MAIN PANEL -->
<div id="admin-screen">
  <div class="admin-header">
    <h1>💕 פאנל ניהול — ממליצה לך בגדול</h1>
    <button class="btn-logout" id="btn-logout">יציאה</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="recs">📋 המלצות</button>
    <button class="tab-btn" data-tab="forum">💬 פורום</button>
  </div>

  <!-- RECOMMENDATIONS TAB -->
  <div class="tab-content active" id="tab-recs">
    <div class="stats-bar">
      <div class="stat-pill" id="stat-recs">טוען...</div>
    </div>
    <div class="search-bar">
      <input type="text" id="search-recs" placeholder="🔍 חיפוש לפי קטגוריה, חנות, תיאור..." />
    </div>
    <div id="recs-container"><div class="loading">טוענת נתונים...</div></div>
  </div>

  <!-- FORUM TAB -->
  <div class="tab-content" id="tab-forum">
    <div class="stats-bar">
      <div class="stat-pill" id="stat-forum">טוען...</div>
    </div>
    <div class="search-bar">
      <input type="text" id="search-forum" placeholder="🔍 חיפוש לפי כותרת או תוכן..." />
    </div>
    <div id="forum-container"><div class="loading">טוענת נתונים...</div></div>
  </div>
</div>

<!-- Lightbox -->
<div id="lb"><img id="lb-img" /></div>

<!-- Edit Modal -->
<div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:10000;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto">
  <div style="background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:1.75rem 1.5rem;width:100%;max-width:480px;margin:auto;direction:rtl">
    <h2 style="color:var(--pink);font-size:1.2rem;margin-bottom:1.25rem">✏️ עריכת המלצה</h2>
    <div id="edit-alert" style="display:none;padding:0.6rem 1rem;border-radius:8px;font-size:0.9rem;margin-bottom:1rem"></div>
    <form id="edit-form">
      <input type="hidden" id="edit-id" />

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem">
        <div>
          <label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.3rem;color:#555">היקף (ס"מ)</label>
          <select id="edit-circumference" style="width:100%;padding:0.6rem 0.75rem;border:1.5px solid #e0c0cc;border-radius:8px;font-family:inherit;font-size:0.9rem;background:#fafafa;outline:none">
          </select>
        </div>
        <div>
          <label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.3rem;color:#555">קאפ</label>
          <select id="edit-cup" style="width:100%;padding:0.6rem 0.75rem;border:1.5px solid #e0c0cc;border-radius:8px;font-family:inherit;font-size:0.9rem;background:#fafafa;outline:none">
            <option value="D">D</option><option value="DD">DD</option><option value="E">E</option>
            <option value="F">F</option><option value="G">G</option><option value="H">H</option>
            <option value="I">I</option><option value="J">J</option><option value="K">K</option>
            <option value="L">L</option>
          </select>
        </div>
      </div>

      <div style="margin-bottom:0.75rem">
        <label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.3rem;color:#555">קטגוריה</label>
        <select id="edit-category" style="width:100%;padding:0.6rem 0.75rem;border:1.5px solid #e0c0cc;border-radius:8px;font-family:inherit;font-size:0.9rem;background:#fafafa;outline:none">
          <option value="חולצות וגופיות">חולצות וגופיות</option>
          <option value="גוזיות וחולצות ספורט">גוזיות וחולצות ספורט</option>
          <option value="חזיות">חזיות</option>
          <option value="שמלות ערב">שמלות ערב</option>
          <option value="שמלות כלה">שמלות כלה</option>
          <option value="בגד ים">בגד ים</option>
          <option value="אחר">אחר</option>
        </select>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem">
        <div>
          <label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.3rem;color:#555">שם חנות</label>
          <input type="text" id="edit-store" style="width:100%;padding:0.6rem 0.75rem;border:1.5px solid #e0c0cc;border-radius:8px;font-family:inherit;font-size:0.9rem;background:#fafafa;outline:none" placeholder="ASOS, זארה..." />
        </div>
        <div>
          <label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.3rem;color:#555">קישור</label>
          <input type="text" id="edit-link" style="width:100%;padding:0.6rem 0.75rem;border:1.5px solid #e0c0cc;border-radius:8px;font-family:inherit;font-size:0.9rem;background:#fafafa;outline:none;direction:ltr;text-align:left" placeholder="https://..." />
        </div>
      </div>

      <div style="margin-bottom:0.75rem">
        <label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.3rem;color:#555">תיאור</label>
        <textarea id="edit-description" rows="3" style="width:100%;padding:0.6rem 0.75rem;border:1.5px solid #e0c0cc;border-radius:8px;font-family:inherit;font-size:0.9rem;background:#fafafa;outline:none;resize:vertical;min-height:70px"></textarea>
      </div>

      <div style="margin-bottom:0.75rem">
        <label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;color:#555">מאפיינים מיוחדים</label>
        <div style="display:flex;gap:1rem;flex-wrap:wrap">
          <label style="display:flex;align-items:center;gap:0.35rem;font-size:0.88rem;cursor:pointer">
            <input type="checkbox" name="edit-features" value="פתוח/חשוף" style="accent-color:var(--pink);width:16px;height:16px" /> פתוח/חשוף
          </label>
          <label style="display:flex;align-items:center;gap:0.35rem;font-size:0.88rem;cursor:pointer">
            <input type="checkbox" name="edit-features" value="מחזיק במיוחד" style="accent-color:var(--pink);width:16px;height:16px" /> מחזיק במיוחד
          </label>
        </div>
      </div>

      <div style="margin-bottom:1.25rem">
        <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.88rem;cursor:pointer;font-weight:600">
          <input type="checkbox" id="edit-anonymous" style="accent-color:var(--pink);width:16px;height:16px" /> העלאה בעילום שם (אנונימי)
        </label>
      </div>

      <div style="display:flex;gap:0.6rem;justify-content:flex-end">
        <button type="button" id="edit-cancel" style="padding:0.6rem 1.2rem;background:#fff;border:1.5px solid #ccc;border-radius:8px;font-family:inherit;font-size:0.9rem;cursor:pointer;color:#666">ביטול</button>
        <button type="submit" class="btn-pink" style="padding:0.6rem 1.4rem;font-size:0.9rem">💾 שמור שינויים</button>
      </div>
    </form>
  </div>
</div>

<script>
(function () {
  const SESSION_KEY = 'admin_pwd';
  let adminPwd = '';
  let allRecs = [];
  let allPosts = [];

  // ── LIGHTBOX ──
  const lb = document.getElementById('lb');
  const lbImg = document.getElementById('lb-img');
  lb.addEventListener('click', () => lb.style.display = 'none');
  function openLb(src) { lbImg.src = src; lb.style.display = 'flex'; }

  // ── LOGIN ──
  const pwdInput  = document.getElementById('pwd-input');
  const loginErr  = document.getElementById('login-error');
  const btnLogin  = document.getElementById('btn-login');

  // Auto-login if stored in session
  const stored = sessionStorage.getItem(SESSION_KEY);
  if (stored) tryLogin(stored);

  btnLogin.addEventListener('click', () => tryLogin(pwdInput.value.trim()));
  pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(pwdInput.value.trim()); });

  async function tryLogin(pwd) {
    if (!pwd) { loginErr.textContent = 'יש להזין סיסמה'; return; }
    try {
      const res  = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      });
      const data = await res.json();
      if (data.success) {
        adminPwd = pwd;
        sessionStorage.setItem(SESSION_KEY, pwd);
        showAdminPanel();
      } else {
        loginErr.textContent = 'סיסמה שגויה ❌';
      }
    } catch {
      loginErr.textContent = 'שגיאת שרת, נסי שוב';
    }
  }

  function showAdminPanel() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display  = 'block';
    loadRecs();
    loadForum();
  }

  // ── LOGOUT ──
  document.getElementById('btn-logout').addEventListener('click', () => {
    sessionStorage.removeItem(SESSION_KEY);
    location.reload();
  });

  // ── TABS ──
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ── HEADERS ──
  function adminHeaders() {
    return { 'Content-Type': 'application/json', 'x-admin-password': adminPwd };
  }

  // ── RECOMMENDATIONS ──
  async function loadRecs() {
    document.getElementById('recs-container').innerHTML = '<div class="loading
